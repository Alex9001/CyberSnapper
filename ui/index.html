<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CyberSnapper</title>
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: #dee2e6;
    --text: #212529;
    --text-secondary: #6c757d;
    --primary: #4361ee;
    --primary-hover: #3a56d4;
    --success: #2ec4b6;
    --error: #e71d36;
    --accent: #ff9f1c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --surface: #1a1b26;
      --border: #2a2b3d;
      --text: #e1e2e8;
      --text-secondary: #9ca0b0;
      --primary: #7c8aff;
      --primary-hover: #6a78e8;
      --success: #2ec4b6;
      --error: #ff6b6b;
      --accent: #ff9f1c;
    }
  }
  .light {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: #dee2e6;
    --text: #212529;
    --text-secondary: #6c757d;
    --primary: #4361ee;
    --primary-hover: #3a56d4;
    --success: #2ec4b6;
    --error: #e71d36;
    --accent: #ff9f1c;
  }
  .dark {
    --bg: #0f1117;
    --surface: #1a1b26;
    --border: #2a2b3d;
    --text: #e1e2e8;
    --text-secondary: #9ca0b0;
    --primary: #7c8aff;
    --primary-hover: #6a78e8;
    --success: #2ec4b6;
    --error: #ff6b6b;
    --accent: #ff9f1c;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }
  .container { max-width: 880px; margin: 0 auto; padding: 24px 20px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 24px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  header h1 span { color: var(--primary); }
  .theme-toggle {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; color: var(--text);
    font-size: 14px; transition: background .2s;
  }
  .theme-toggle:hover { background: var(--border); }

  .card {
    background: var(--surface); border-radius: 12px;
    border: 1px solid var(--border); padding: 24px;
    margin-bottom: 20px; transition: background .3s, border-color .3s;
  }
  .card h2 {
    font-size: 15px; font-weight: 600; margin-bottom: 12px;
    color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px;
  }

  textarea {
    width: 100%; min-height: 140px; padding: 14px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    line-height: 1.6; resize: vertical; transition: border-color .2s;
    outline: none;
  }
  textarea:focus { border-color: var(--primary); }
  textarea::placeholder { color: var(--text-secondary); }

  .actions {
    display: flex; gap: 10px; align-items: center;
    margin-top: 16px; flex-wrap: wrap;
  }
  .btn {
    padding: 10px 24px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: var(--primary); color: #fff;
  }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary {
    background: var(--border); color: var(--text);
  }
  .btn-secondary:hover { opacity: .8; }
  .btn-outline {
    background: none; border: 1px solid var(--border); color: var(--text);
  }
  .btn-outline:hover { background: var(--border); }

  .hint {
    font-size: 13px; color: var(--text-secondary); margin-left: 4px;
  }

  #progress { display: none; }
  #progress.active { display: block; }

  .url-result {
    margin-bottom: 16px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .url-result:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .url-result .url-line {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    font-size: 14px; font-weight: 500;
  }
  .url-result .url-line .status-icon { font-size: 16px; }
  .url-result .url-line .url-text {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .url-result .url-line .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--border); margin-left: auto; white-space: nowrap;
  }
  .badge.done { background: var(--success); color: #fff; }
  .badge.error { background: var(--error); color: #fff; }

  .viewports {
    display: flex; gap: 8px; flex-wrap: wrap; margin-left: 24px;
  }
  .vp-item {
    padding: 4px 12px; border-radius: 6px; font-size: 12px;
    background: var(--bg); border: 1px solid var(--border);
    display: flex; align-items: center; gap: 4px;
  }
  .vp-item.done { border-color: var(--success); color: var(--success); }
  .vp-item.error { border-color: var(--error); color: var(--error); }
  .vp-item.active {
    border-color: var(--accent); color: var(--accent);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

  .summary {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .summary .count { font-size: 14px; color: var(--text-secondary); }
  .summary .count strong { color: var(--text); }

  #snap-count {
    display: none;
  }

  #open-folder-btn { display: none; }
  #open-folder-btn.visible { display: inline-flex; }

  .gallery {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px; margin-top: 12px;
  }
  .gallery-item {
    border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border); cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    position: relative;
  }
  .gallery-item:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(0,0,0,.3); }
  .gallery-item img {
    width: 100%; display: block;
  }
  .gallery-item .label {
    padding: 6px 8px; font-size: 11px; color: var(--text-secondary);
    background: var(--surface);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>⌁</span> CyberSnapper</h1>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀︎ / ☾</button>
  </header>

  <div class="card">
    <h2>URLs</h2>
    <textarea id="urls-input" placeholder="https://example.com&#10;https://google.com&#10;one-per-line" spellcheck="false"></textarea>
    <div class="actions">
      <button class="btn btn-primary" id="snap-btn">📸 Snap!</button>
      <span class="hint">or run with arguments for CLI mode</span>
    </div>
  </div>

  <div class="card" id="progress">
    <h2>Capturing</h2>
    <div id="results"></div>
    <div class="summary">
      <div class="count" id="snap-count">Captured <strong id="done-count">0</strong> screenshots</div>
      <div>
        <button class="btn btn-outline" id="open-folder-btn">📁 Open folder</button>
      </div>
    </div>
    <div id="gallery" class="gallery"></div>
  </div>
</div>

<script>
const themeToggle = document.getElementById('theme-toggle');
const urlInput = document.getElementById('urls-input');
const snapBtn = document.getElementById('snap-btn');
const progressEl = document.getElementById('progress');
const resultsEl = document.getElementById('results');
const doneCount = document.getElementById('done-count');
const snapCount = document.getElementById('snap-count');
const openFolderBtn = document.getElementById('open-folder-btn');
const gallery = document.getElementById('gallery');

let totalSnaps = 0;

function setTheme(theme) {
  document.documentElement.className = theme;
  localStorage.setItem('theme', theme);
}
function getPreferredTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
setTheme(getPreferredTheme());
themeToggle.addEventListener('click', () => {
  setTheme(document.documentElement.className === 'dark' ? 'light' : 'dark');
});

snapBtn.addEventListener('click', startCapture);

async function startCapture() {
  const text = urlInput.value.trim();
  if (!text) return;

  const urls = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (urls.length === 0) return;

  snapBtn.disabled = true;
  snapBtn.textContent = '⏳ Capturing...';
  progressEl.classList.add('active');
  resultsEl.innerHTML = '';
  gallery.innerHTML = '';
  totalSnaps = 0;
  snapCount.style.display = 'none';
  openFolderBtn.classList.remove('visible');
  doneCount.textContent = '0';

  try {
    const response = await fetch('/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const event = JSON.parse(line.slice(6));
            handleEvent(event);
          } catch (e) { /* skip malformed */ }
        }
      }
    }
  } catch (err) {
    resultsEl.innerHTML += `<div class="url-result">Connection error: ${err.message}</div>`;
  } finally {
    snapBtn.disabled = false;
    snapBtn.textContent = '📸 Snap!';
  }
}

function handleEvent(event) {
  switch (event.type) {
    case 'url-start': {
      const div = document.createElement('div');
      div.className = 'url-result';
      div.id = `url-${event.index}`;
      div.innerHTML = `
        <div class="url-line">
          <span class="status-icon">⏳</span>
          <span class="url-text">${escapeHtml(event.url)}</span>
          <span class="badge">${event.index + 1}/${event.total}</span>
        </div>
        <div class="viewports" id="vps-${event.index}"></div>
      `;
      resultsEl.appendChild(div);
      break;
    }
    case 'url-error': {
      const div = resultsEl.lastChild;
      if (div) {
        div.querySelector('.status-icon').textContent = '❌';
        div.querySelector('.badge').textContent = 'invalid';
      }
      break;
    }
    case 'url-done': {
      const div = resultsEl.lastChild;
      if (div) {
        div.querySelector('.status-icon').textContent = '✅';
        div.querySelector('.badge').className = 'badge done';
        div.querySelector('.badge').textContent = 'done';
      }
      break;
    }
    case 'viewport-start': {
      const vps = document.getElementById(`vps-${event.index}`);
      if (vps) {
        const item = document.createElement('span');
        item.className = 'vp-item active';
        item.id = `vp-${event.index}-${event.viewport}`;
        item.textContent = `▸ ${event.viewport}`;
        vps.appendChild(item);
      }
      break;
    }
    case 'viewport-error': {
      const item = document.getElementById(`vp-${event.index}-${event.viewport}`);
      if (item) {
        item.className = 'vp-item error';
        item.textContent = `✗ ${event.viewport}`;
      }
      break;
    }
    case 'viewport-done': {
      const item = document.getElementById(`vp-${event.index}-${event.viewport}`);
      if (item) {
        item.className = 'vp-item done';
        item.textContent = `✓ ${event.viewport}`;
        item.title = event.file;
      }
      totalSnaps++;
      doneCount.textContent = totalSnaps;
      snapCount.style.display = 'block';
      openFolderBtn.classList.add('visible');

      const thumb = document.createElement('div');
      thumb.className = 'gallery-item';
      const filename = event.file.split('/').pop() || event.file.split('\\').pop();
      thumb.innerHTML = `
        <img src="/screenshots/${filename}" loading="lazy" alt="${filename}">
        <div class="label">${filename.replace('.png','')}</div>
      `;
      thumb.addEventListener('click', () => window.open(`/screenshots/${filename}`, '_blank'));
      gallery.prepend(thumb);
      break;
    }
    case 'done': {
      const last = resultsEl.lastChild;
      break;
    }
  }
}

openFolderBtn.addEventListener('click', () => {
  fetch('/open-folder').catch(() => {});
});

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
